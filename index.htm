        let datiClienteCorrente = null;

        function iniziaCompilazione() {
            const codice = document.getElementById("codiceCliente").value.trim();
            if (!databaseClienti[codice]) {
                alert("Codice cliente non trovato.");
                return;
            }

            datiClienteCorrente = databaseClienti[codice];

            document.getElementById("schermataAccesso").style.display = "none";
            document.getElementById("schermataCompilazione").style.display = "flex";
            document.getElementById("info-farmacia").innerText = datiClienteCorrente.RagioneSociale + " (Cod: " + codice + ")";

            // Percorso relativo al PDF template (vuoto, con soli campi)
            const urlPdfTarget = "/listino/listino.pdf";

            const params = `#CodiceCliente=${encodeURIComponent(codice)}` +
                           `&RagioneSociale=${encodeURIComponent(datiClienteCorrente.RagioneSociale)}` +
                           `&PartitaIva=${encodeURIComponent(datiClienteCorrente.PartitaIva)}` +
                           `&IBAN=${encodeURIComponent(datiClienteCorrente.IBAN)}` +
                           `&SDI=${encodeURIComponent(datiClienteCorrente.SDI)}` +
                           `&Tel=${encodeURIComponent(datiClienteCorrente.Tel)}` +
                           `&Email=${encodeURIComponent(datiClienteCorrente.Email)}`;

            document.getElementById("pdf-container").src = "./pdfjs/web/viewer.html?file=" + encodeURIComponent(urlPdfTarget) + params;
        }

        async function inviaOrdine() {
            if (!datiClienteCorrente) return;
            if (!confirm("Sei sicuro di voler inviare l'ordine?")) return;

            const btn = document.getElementById("btnInvia");
            const statusBar = document.getElementById("statusBar");
            btn.disabled = true;
            statusBar.style.color = "#7f8c8d";
            statusBar.innerText = "Lettura dati dal modulo in corso...";

            const iframe = document.getElementById("pdf-container");
            let datiModulo = {};

            try {
                const pdfApp = iframe.contentWindow.PDFViewerApplication;
                if (!pdfApp || !pdfApp.pdfDocument) {
                    throw new Error("Il documento PDF non è ancora pronto. Attendi il caricamento completo e riprova.");
                }

                const pdfDoc = pdfApp.pdfDocument;
                const storage = pdfDoc.annotationStorage;
                const fieldObjectsMap = await pdfDoc.getFieldObjects();

                // Costruiamo un oggetto PULITO chiave/valore: nome campo -> valore digitato
                // (usiamo annotationStorage.getValue per prendere il valore REALE inserito
                // dall'utente, non il valore di default salvato nel PDF)
                for (const nomeCampo in fieldObjectsMap) {
                    const listaCampi = fieldObjectsMap[nomeCampo];
                    listaCampi.forEach(function (campo) {
                        const risultato = storage.getValue(campo.id, { value: campo.value });
                        datiModulo[nomeCampo] = risultato.value;
                    });
                }
            } catch (e) {
                statusBar.style.color = "#c0392b";
                statusBar.innerText = "Errore lettura PDF: " + e.message;
                btn.disabled = false;
                return;
            }

            const urlPowerAutomate = "https://default9bca582b952d496396acbade8d9fa3.a1.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/27/workflows/a0cba5552efd445489af129c695dacfa/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=SmTWWuiGYYqsQKnE7YV748qfOwnoLfiVbcfhOvhaPzc";

            const payload = {
                "CodiceCliente": document.getElementById("codiceCliente").value.trim(),
                "RagioneSociale": datiClienteCorrente.RagioneSociale,
                "PartitaIva": datiClienteCorrente.PartitaIva,
                "IBAN": datiClienteCorrente.IBAN,
                "SDI": datiClienteCorrente.SDI,
                "Tel": datiClienteCorrente.Tel,
                "Email": datiClienteCorrente.Email,
                // Oggetto piatto e pulito, pronto per "Analizza JSON" nel flow
                "QuantitaOrdinate": JSON.stringify(datiModulo)
            };

            statusBar.innerText = "Invio ordine in corso...";

            fetch(urlPowerAutomate, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(function (response) {
                if (response.ok) {
                    statusBar.style.color = "#1e8449";
                    statusBar.innerText = "Ordine inviato ed elaborato correttamente!";
                    alert("Ordine inviato ed elaborato correttamente!");
                } else {
                    throw new Error("Il server ha risposto con stato " + response.status);
                }
            })
            .catch(function (error) {
                statusBar.style.color = "#c0392b";
                statusBar.innerText = "Errore durante l'invio: " + error.message;
                alert("Errore durante l'invio dell'ordine: " + error.message);
                btn.disabled = false;
            });
        }
